apiVersion: apps/v1
kind: Deployment
metadata:
  name: multimodal-fashion-recommender
  namespace: mfs
  labels:
    app: multimodal-fashion-recommender
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: multimodal-fashion-recommender
  template:
    metadata:
      labels:
        app: multimodal-fashion-recommender
    spec:
      initContainers:
        - name: fetch-assets
          image: alpine:3.20
          imagePullPolicy: IfNotPresent
          env:
            - name: OWNER
              value: LeeSY99
            - name: REPO
              value: multimodal-fashion-recommender-system
            - name: DATA_ASSETS_VER
              value: d0.1.0
            - name: MODEL_ASSETS_VER
              value: m0.1.0
          command:
            - /bin/sh
            - -lc
            - |
              apk add --no-cache curl tar
              /opt/scripts/fetch_assets.sh
          volumeMounts:
            - name: data-volume
              mountPath: /work/data
            - name: model-volume
              mountPath: /work/models
            - name: fetch-script
              mountPath: /opt/scripts/fetch_assets.sh
              subPath: fetch_assets.sh
              readOnly: true
      containers:
        - name: app
          image: ghcr.io/leesy99/multimodal-fashion-recommender-system:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: DB_PATH
              value: /app/data/fashion_items.db
            - name: BM25_PATH
              value: /app/data/bm25_from_item_docs.pkl
            - name: IMAGE_INDEX_PATH
              value: /app/data/image_index_with_ids.faiss
            - name: ALS_CONFIG_PATH
              value: /app/config/als_model.yaml
          readinessProbe:
            httpGet:
              path: /ui/
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /ui/
              port: http
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 4
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "6Gi"
          volumeMounts:
            - name: data-volume
              mountPath: /app/data
              readOnly: true
            - name: model-volume
              mountPath: /app/models
              readOnly: true
            - name: als-config
              mountPath: /app/config/als_model.yaml
              subPath: als_model.yaml
              readOnly: true
      volumes:
        - name: data-volume
          emptyDir: {}
        - name: model-volume
          emptyDir: {}
        - name: als-config
          configMap:
            name: mfs-als-config
        - name: fetch-script
          configMap:
            name: mfs-assets-fetch-script
            defaultMode: 0755
